<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="flex flex-col md:flex-row bg-white shadow-lg overflow-hidden">
        <div class="hidden md:block md:w-1/2">
            <img alt="A wooden board with the word 'Welcome' written on it" class="w-full h-full object-cover" height="800" src="login img.png" width="600"/>
        </div>
        <div class="md:w-1/2 p-8">
            <div class="flex flex-col items-center">
                <img alt="Logo" class="mb-4" src="images/image 979.png"/>
                <h2 class="text-3xl font-bold mb-4">Login</h2>
                <p class="text-gray-600 mb-6">Welcome back! Please log in to access your account.</p>
            </div>
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700" for="email">Email</label>
                    <input class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" id="email" placeholder="Enter your Email" type="email"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700" for="password">Password</label>
                    <div class="relative mt-1">
                        <input class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" id="password" placeholder="Enter your Password" type="password"/>
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 cursor-pointer" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700" for="confirm-password">Confirm Password</label>
                    <div class="relative mt-1">
                        <input class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500" id="confirm-password" placeholder="Enter your Password" type="password"/>
                        <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 cursor-pointer" onclick="togglePassword('confirm-password', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded" id="remember-me" type="checkbox"/>
                        <label class="ml-2 block text-sm text-gray-900" for="remember-me">Remember Me</label>
                    </div>
                    <div class="text-sm">
                        <a class="font-medium text-indigo-600 hover:text-indigo-500" href="#">Forgot Password?</a>
                    </div>
                </div>
                <div>
                    <button class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500" type="submit">Login</button>
                </div>
                <div class="flex items-center justify-center mt-4">
                    <span class="border-t border-gray-300 flex-grow mr-3"></span>
                    <span class="text-gray-500">OR</span>
                    <span class="border-t border-gray-300 flex-grow ml-3"></span>
                </div>
                <div>
                    <button class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50" type="button">
                        <img alt="Google logo" class="mr-2" height="20" src="images/google.avif" width="20"/>
                        Login with Google
                    </button>
                </div>
                <div class="text-center mt-4">
                    <p class="text-sm text-gray-600">
                        Don't have an account?
                        <a class="font-medium text-indigo-600 hover:text-indigo-500" href="#">Sign Up <i class="fas fa-arrow-right"></i></a>
                    </p>
                </div>
            </form>
        </div>
    </div>
    <script>
        function togglePassword(fieldId, icon) {
            const field = document.getElementById(fieldId);
            const type = field.getAttribute('type') === 'password' ? 'text' : 'password';
            field.setAttribute('type', type);
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }
    </script>
</body>
</html>
